# nginx/somerville.conf — canonical site config for the Somerville 311 portal.
#
# Source of truth for what's deployed at /etc/nginx/sites-available/somerville
# on EC2. Edit this file in repo, then deploy with:
#
#   scp nginx/somerville.conf oxygen-mvp:/tmp/somerville.conf
#   ssh oxygen-mvp 'sudo cp /tmp/somerville.conf /etc/nginx/sites-available/somerville \
#                && sudo nginx -t \
#                && sudo systemctl reload nginx'
#
# The `default` site (sites-available/default) is NOT enabled. Only
# sites-enabled/somerville → sites-available/somerville. nginx docroot is
# /var/www/somerville (NOT /var/www/html — that's the legacy default's
# unused docroot).
#
# `/home/ubuntu` is chmod 755 so nginx www-data can traverse to in-repo
# paths under it (notably the dbt docs at dbt/target/). Subdirs like
# .ssh keep their own 700.

server {
    listen 80;
    server_name _;

    # Portal
    root /var/www/somerville;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # dbt docs (generated to dbt/target/, served by alias)
    location /docs {
        alias /home/ubuntu/oxygen-mvp/dbt/target;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # /metrics — auto-generated metrics catalog (run.sh step 7)
    location = /metrics {
        try_files /metrics.html =404;
    }

    # /trust — auto-generated trust report (run.sh step 8)
    location = /trust {
        try_files /trust.html =404;
    }

    # /chat — Basic-Auth-gated proxy to the Oxygen SPA at localhost:3000.
    # MVP 1.5 throwaway scaffolding: HTTP cleartext + single shared
    # credential. Replaced by MVP 4's Magic Link + HTTPS via Oxygen
    # multi-workspace mode. Credential lives at /etc/nginx/.htpasswd
    # (root:www-data 640, NOT in repo). See docs/limitations/chat-auth-
    # basic-cleartext.md for the tradeoff statement.
    location /chat {
        auth_basic "Somerville Analytics — Private Beta";
        auth_basic_user_file /etc/nginx/.htpasswd;

        rewrite ^/chat/?(.*)$ /$1 break;
        proxy_pass http://localhost:3000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for streaming agent replies
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # SPA bundled assets (JS/CSS shipped by Vite). Auth-gated proxy.
    # If left unauthenticated, anyone could fetch the JS bundle by URL
    # even though /chat is gated.
    location /assets {
        auth_basic "Somerville Analytics — Private Beta";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA REST API. Auth-gated proxy. WebSocket headers retained in case
    # any /api/* route upgrades to WS (streaming queries, etc).
    location /api {
        auth_basic "Somerville Analytics — Private Beta";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # SPA favicon. Auth-gated proxy so it doesn't reveal SPA presence
    # to unauthenticated visitors (the portal has its own favicon
    # served from /var/www/somerville if present).
    location = /favicon-logo.svg {
        auth_basic "Somerville Analytics — Private Beta";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
