# nginx/somerville.conf — canonical site config for the Somerville 311 portal.
#
# Source of truth for what's deployed at /etc/nginx/sites-available/somerville
# on EC2. Edit this file in repo, then deploy with:
#
#   scp nginx/somerville.conf oxygen-mvp:/tmp/somerville.conf
#   ssh oxygen-mvp 'sudo cp /tmp/somerville.conf /etc/nginx/sites-available/somerville \
#                && sudo nginx -t \
#                && sudo systemctl reload nginx'
#
# The `default` site (sites-available/default) is NOT enabled. Only
# sites-enabled/somerville → sites-available/somerville. nginx docroot is
# /var/www/somerville (NOT /var/www/html — that's the legacy default's
# unused docroot).
#
# `/home/ubuntu` is chmod 755 so nginx www-data can traverse to in-repo
# paths under it (notably the dbt docs at dbt/target/). Subdirs like
# .ssh keep their own 700.

server {
    listen 80;
    server_name _;

    # Portal
    root /var/www/somerville;
    index index.html;

    # No heuristic caching: browsers must revalidate with origin (ETag /
    # Last-Modified) before using a cached copy. 2026-05-14: prior absence
    # of Cache-Control made a fresh /erd deploy invisible to a soft refresh
    # because the browser served a heuristic-fresh cached copy. With
    # `no-cache, must-revalidate`, every refresh revalidates -- nginx
    # returns 304 if unchanged, 200 with new bytes if changed. Cheap; no
    # perf hit for fonts/SVGs because they still 304 on unchanged.
    add_header Cache-Control "no-cache, must-revalidate" always;

    location / {
        try_files $uri $uri/ =404;
    }

    # dbt docs (generated to dbt/target/, served by alias)
    location /docs {
        alias /home/ubuntu/oxygen-mvp/dbt/target;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # /metrics — auto-generated metrics catalog (run.sh step 7)
    location = /metrics {
        try_files /metrics.html =404;
    }

    # /trust — auto-generated trust report (run.sh step 8)
    location = /trust {
        try_files /trust.html =404;
    }

    # /profile — auto-generated column profiles (Plan 1b, run.sh step 9d)
    location = /profile {
        try_files /profile.html =404;
    }

    # /erd — auto-generated warehouse + semantic-layer diagrams (Plan 1b, run.sh step 9e)
    location = /erd {
        try_files /erd.html =404;
    }

    # /dashboards — hand-written listing of apps/*.app.yml dashboards (Plan 11)
    # Future plans will generate this page from apps/ metadata.
    location = /dashboards {
        try_files /dashboards.html =404;
    }

    # /about — auto-generated city-orientation info page (Prompt 11 Phase E)
    # Reads main_bronze.raw_somerville_at_a_glance for KPI values.
    location = /about {
        try_files /about.html =404;
    }

    # /chat — Basic-Auth-gated entry point to the Oxygen SPA at
    # localhost:3000. MVP 1.5 throwaway scaffolding: HTTP cleartext +
    # single shared credential. Credential lives at /etc/nginx/.htpasswd
    # (root:www-data 640, NOT in repo). See docs/limitations/chat-auth-
    # basic-cleartext.md for the tradeoff statement.
    #
    # Auth applies to /chat only. SPA internal calls (/api, /assets,
    # /home, /threads/*, etc.) are NOT auth-gated because the SPA's
    # streaming agent POST omits credentials (the browser's stored
    # Basic Auth doesn't reach it). Trade-off: anyone who discovers
    # /api/* URL patterns could query the agent without auth (API
    # token burn risk). Mitigated by Anthropic spend cap + URL not
    # widely shared + Tailnet :3000 remaining the project-team path.
    # Replaced by MVP 4's Magic Link + HTTPS via Oxygen multi-
    # workspace mode.
    location /chat {
        auth_basic "Somerville Analytics — Private Beta";
        auth_basic_user_file /etc/nginx/.htpasswd;

        rewrite ^/chat/?(.*)$ /$1 break;
        proxy_pass http://localhost:3000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for streaming agent replies
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # SPA internal paths — proxied through nginx without auth.
    # The /chat entry gate is the only auth checkpoint; once a user
    # is past it, the SPA's internal wiring goes unauth (see /chat
    # comment above for rationale).
    location /assets {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # SPA top-level routes (client-side routing targets). The SPA at
    # /chat may navigate to /home, /threads/<id>, etc. These need to
    # proxy to the SPA root (which returns the SPA index.html and lets
    # client-side routing pick up).
    location /home {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /threads {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA branding + favicon assets (loaded by JS at runtime).
    location = /favicon-logo.svg {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location ~* ^/oxygen-.*\.(svg|gif|png)$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
