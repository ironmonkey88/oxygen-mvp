name: built_environment
description: |
  Somerville building / inspection permits from the city's Inspectional
  Services Department open-data feed. One row per source permit number
  with type, status, amount, and ward (derived via spatial join).
  Shares the wards and dates dimensions with service_requests and
  public_safety so cross-topic comparison queries (permits vs 311 by
  ward, permits vs crime by year) join via the common dims.
views:
  - permits
  - wards
  - dates
