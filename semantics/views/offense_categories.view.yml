name: offense_categories
description: "NIBRS top-level offense category dimension (4 categories — Person, Property, Society, Other)."
table: main_gold.dim_offense_category
datasource: somerville

entities:
  - name: offense_category
    type: primary
    key: offense_category

dimensions:
  - name: offense_category
    type: string
    expr: offense_category
    primary_key: true
    description: "NIBRS top-level category name."
    samples: ["Crimes against Person", "Crimes against Property", "Crimes against Society", "Other"]
  - name: severity_rank
    type: number
    expr: severity_rank
    description: "Editorial ordinal — 1=Person, 2=Property, 3=Society, 4=Other. Used for consistent sort order in dashboards."

measures:
  - name: category_count
    type: count
    description: "Total categories (always 4)."
