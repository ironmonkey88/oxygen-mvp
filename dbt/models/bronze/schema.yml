version: 2

sources:
  - name: bronze_raw
    description: |
      Raw landing tables written directly by dlt. Owned by the pipeline,
      not dbt; dbt sees them through the `source()` macro for lineage but
      does not materialize them.
    schema: main_bronze
    tables:
      - name: raw_311_requests_raw
        description: |
          dlt merge target for the Somerville 311 SODA API
          (https://data.somervillema.gov/resource/4pyi-uqq6.json). Full
          pull each run; merge key is `id`. Audit columns added by the
          pipeline: `_extracted_at`, `_extracted_run_id`, `_first_seen_at`,
          `_source_endpoint`, plus dlt's own `_dlt_load_id` / `_dlt_id`.

models:
  - name: raw_311_requests
    description: |
      Bronze view over the Somerville 311 SODA mirror. Passes the 22
      source columns through `main_bronze.raw_311_requests_raw` (dlt-owned)
      and carries the pipeline-metadata columns through to gold. Arrival
      checks only — type casts, referential integrity, and PII redaction
      are deferred to silver/gold.
    columns:
      - name: id
        description: 'Somerville 311 request ID. Primary key from source; also the dlt merge key.'
        data_tests:
          - not_null
          - unique
      - name: classification
        description: 'Top of the type hierarchy. One of Service, Information, Feedback.'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Service', 'Information', 'Feedback']
      - name: category
        description: 'Mid-level grouping within classification (e.g. Parking, Trash & Recycling).'
      - name: type
        description: 'Leaf level of the source classification/category/type hierarchy. Becomes `request_type` in gold.'
      - name: origin_of_request
        description: 'How the request was submitted (Contact Center, Website, etc.). Becomes `origin` in gold.'
      - name: date_created
        description: 'Timestamp the request was opened. VARCHAR at bronze; cast to TIMESTAMPTZ in gold.'
        data_tests:
          - not_null
      - name: most_recent_status
        description: 'Latest status of the request (Open / Closed / In Progress / On Hold).'
      - name: most_recent_status_date
        description: 'Timestamp the most recent status was last set. VARCHAR at bronze; cast in gold.'
      - name: block_code
        description: 'Block identifier. Padded with spaces in source when unknown — see [docs/limitations/block-code-padded.md](../../../docs/limitations/block-code-padded.md). Cleanup deferred to Silver (MVP 3).'
      - name: ward
        description: 'Somerville ward 1–7 as VARCHAR. NULL when unknown.'
      - name: accuracy
        description: 'Post-resolution survey field for accuracy. Sparse (<1% of rows) — see [docs/limitations/2024-survey-columns-sparse.md](../../../docs/limitations/2024-survey-columns-sparse.md).'
      - name: courtesy
        description: 'Post-resolution survey field for courtesy. Sparse (<1% of rows) — see [docs/limitations/2024-survey-columns-sparse.md](../../../docs/limitations/2024-survey-columns-sparse.md).'
      - name: ease
        description: 'Post-resolution survey field for ease. Sparse (<1% of rows) — see [docs/limitations/2024-survey-columns-sparse.md](../../../docs/limitations/2024-survey-columns-sparse.md).'
      - name: overallexperience
        description: 'Post-resolution survey field for overall experience. Sparse (<1% of rows) — see [docs/limitations/2024-survey-columns-sparse.md](../../../docs/limitations/2024-survey-columns-sparse.md).'
      - name: emergency_readiness_and_response_planning
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_emergency_readiness_tag`). Sparse — only ~4,187 rows of 1.17M carry any dept tag."
      - name: green_space_care_and_maintenance
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_green_space_tag`). Sparse."
      - name: infrastructure_maintenance_and_repairs
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_infrastructure_tag`). Sparse."
      - name: noise_and_activity_disturbances
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_noise_tag`). Sparse."
      - name: reliable_service_delivery
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_reliable_service_tag`). Sparse."
      - name: navigating_city_services_and_policies
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_city_services_tag`). Sparse."
      - name: public_space_cleanliness_and_environmental_health
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_public_space_tag`). Sparse."
      - name: voting_and_election_information
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_voting_tag`). Sparse."
      - name: _extracted_at
        description: |
          **PIPELINE METADATA — not for analysis.** UTC timestamp when this
          row was last extracted from the SODA endpoint. Advances on every
          run that touched the row. Use for run-traceability, not for
          business questions about when an event occurred — use
          `date_created` (gold: `opened_dt`) for the latter.
      - name: _extracted_run_id
        description: |
          **PIPELINE METADATA — not for analysis.** ULID of the pipeline
          run that produced this row's current state. Joins to
          `main_admin.fct_pipeline_run_raw.run_id` for run-level diagnostics.
      - name: _first_seen_at
        description: |
          **PIPELINE METADATA — not for analysis.** UTC timestamp when this
          row was first ingested into our warehouse. Preserved across
          subsequent re-extractions. Distinguishes "when did the city
          create this case" (`date_created`) from "when did our pipeline
          first see it" (this column). Maintained by a post-merge UPDATE
          inside `dlt/somerville_311_pipeline.py`, not by dlt's payload.
      - name: _source_endpoint
        description: |
          **PIPELINE METADATA — not for analysis.** SODA endpoint URL this
          row was extracted from. Static for this project; present
          structurally to support multi-source extensions.
      - name: _dlt_load_id
        description: 'dlt load identifier — retained at every layer for source-to-pipeline lineage.'
      - name: _dlt_id
        description: 'dlt row identifier — retained at every layer for source-to-pipeline lineage.'
