version: 2

sources:
  - name: bronze_raw
    description: |
      Raw landing tables written directly by dlt. Owned by the pipeline,
      not dbt; dbt sees them through the `source()` macro for lineage but
      does not materialize them.
    schema: main_bronze
    tables:
      - name: raw_311_requests_raw
        description: |
          dlt merge target for the Somerville 311 SODA API
          (https://data.somervillema.gov/resource/4pyi-uqq6.json). Full
          pull each run; merge key is `id`. Audit columns added by the
          pipeline: `_extracted_at`, `_extracted_run_id`, `_first_seen_at`,
          `_source_endpoint`, plus dlt's own `_dlt_load_id` / `_dlt_id`.
      - name: raw_somerville_wards_raw
        description: |
          Python-owned mirror of the Socrata `ym5n-phxd` (Wards) blob
          shapefile, materialized via DuckDB's spatial extension. Source:
          ESRI polygon feature class from the 2020 Census redistricting.
          One row per administrative ward (7 wards). Drop+recreate on
          each `scripts/ingest_somerville_wards.py` run (static reference
          data, no incremental tracking). Holds the binary GEOMETRY column
          in the source projection (NAD83 / MA Mainland, EPSG:2249) plus
          WKT strings in both source projection and WGS84 EPSG:4326.
      - name: raw_somerville_crime_raw
        description: |
          dlt merge target for the Somerville Police Department crime
          reports SODA API
          (https://data.somervillema.gov/resource/aghs-hqvg.json). Full
          pull each run; merge key is `incnum`. ~22K rows as of
          2026-05-13; data goes back to 2017. Source refreshes daily with
          a one-month publication delay. Source-level PII redaction is
          applied to sensitive incidents (time / location stripped); see
          docs/limitations/crime-data-pii-unredacted-in-bronze.md for the
          full breakdown. Audit columns: `_extracted_at`,
          `_extracted_run_id`, `_first_seen_at`, `_source_endpoint`, plus
          dlt's `_dlt_load_id` / `_dlt_id`.
      - name: raw_somerville_permits_raw
        description: |
          dlt replace target for the Somerville Permits SODA API
          (https://data.somervillema.gov/resource/vxgw-vmky.json).
          Inspectional Services Department permit applications dating
          back to 2014. 64,521 rows / 10 columns as of 2026-05-14.
          **Source `rowsUpdatedAt` is 2023-05-16** -- nearly 3 years
          stale; this dataset appears to have stopped refreshing in May
          2023. Replace-mode ingestion: not wired into `run.sh` (no
          point on a daily cadence when the source is static); re-run
          manually via `dlt/somerville_permits_pipeline.py` if a new
          wave publishes. No `ward` column at source -- ward-joined
          analysis requires spatial join via `latitude`/`longitude` to
          `dim_ward.geometry_wkt_wgs84` (silver work, MVP 3). See
          docs/limitations/permits-static-since-2023.md for the
          staleness caveat + status-column data quality issue. Audit
          columns: `_extracted_at`, `_extracted_run_id`,
          `_source_endpoint`. No `_first_seen_at` (replace wipes).
      - name: raw_somerville_happiness_survey_raw
        description: |
          dlt replace target for the Somerville Happiness Survey SODA
          API (https://data.somervillema.gov/resource/wmeh-zuz2.json).
          Biennial city-wide survey, 2011-2025 (8 waves). 12,583 rows /
          150 columns as of 2026-05-14. One row per respondent-response;
          `id` is the source PK. Replace-mode ingestion (not merge):
          static between biennial updates, re-ingest fresh each manual
          run. **Not wired into `run.sh`** -- re-run manually when a new
          wave publishes (`dlt/somerville_happiness_survey_pipeline.py`).
          150 columns reflect cumulative survey shape across waves;
          column-level NULL patterns vary by year (waves don't ask the
          same questions). Self-selection bias is real -- respondents
          are not a random sample; any analytical pairing with
          operational data carries that caveat. Audit columns:
          `_extracted_at`, `_extracted_run_id`, `_source_endpoint`. No
          `_first_seen_at` (replace mode wipes the table each ingest).

models:
  - name: raw_311_requests
    description: |
      Bronze view over the Somerville 311 SODA mirror. Passes the 22
      source columns through `main_bronze.raw_311_requests_raw` (dlt-owned)
      and carries the pipeline-metadata columns through to gold. Arrival
      checks only -- type casts, referential integrity, and PII redaction
      are deferred to silver/gold.
    columns:
      - name: id
        description: 'Somerville 311 request ID. Primary key from source; also the dlt merge key.'
        data_tests:
          - not_null
          - unique
      - name: classification
        description: 'Top of the type hierarchy. One of Service, Information, Feedback.'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Service', 'Information', 'Feedback']
      - name: category
        description: 'Mid-level grouping within classification (e.g. Parking, Trash & Recycling).'
      - name: type
        description: 'Leaf level of the source classification/category/type hierarchy. Becomes `request_type` in gold.'
      - name: origin_of_request
        description: 'How the request was submitted (Contact Center, Website, etc.). Becomes `origin` in gold.'
      - name: date_created
        description: 'Timestamp the request was opened. VARCHAR at bronze; cast to TIMESTAMPTZ in gold.'
        data_tests:
          - not_null
      - name: most_recent_status
        description: 'Latest status of the request (Open / Closed / In Progress / On Hold).'
      - name: most_recent_status_date
        description: 'Timestamp the most recent status was last set. VARCHAR at bronze; cast in gold.'
      - name: block_code
        description: 'Block identifier. Padded with spaces in source when unknown -- see [docs/limitations/block-code-padded.md](../../../docs/limitations/block-code-padded.md). Cleanup deferred to Silver (MVP 3).'
      - name: ward
        description: 'Somerville ward 1-7 as VARCHAR. NULL when unknown.'
      - name: accuracy
        description: 'Post-resolution survey field for accuracy. Sparse (<1% of rows) -- see [docs/limitations/2024-survey-columns-sparse.md](../../../docs/limitations/2024-survey-columns-sparse.md).'
      - name: courtesy
        description: 'Post-resolution survey field for courtesy. Sparse (<1% of rows) -- see [docs/limitations/2024-survey-columns-sparse.md](../../../docs/limitations/2024-survey-columns-sparse.md).'
      - name: ease
        description: 'Post-resolution survey field for ease. Sparse (<1% of rows) -- see [docs/limitations/2024-survey-columns-sparse.md](../../../docs/limitations/2024-survey-columns-sparse.md).'
      - name: overallexperience
        description: 'Post-resolution survey field for overall experience. Sparse (<1% of rows) -- see [docs/limitations/2024-survey-columns-sparse.md](../../../docs/limitations/2024-survey-columns-sparse.md).'
      - name: emergency_readiness_and_response_planning
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_emergency_readiness_tag`). Sparse -- only ~4,187 rows of 1.17M carry any dept tag."
      - name: green_space_care_and_maintenance
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_green_space_tag`). Sparse."
      - name: infrastructure_maintenance_and_repairs
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_infrastructure_tag`). Sparse."
      - name: noise_and_activity_disturbances
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_noise_tag`). Sparse."
      - name: reliable_service_delivery
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_reliable_service_tag`). Sparse."
      - name: navigating_city_services_and_policies
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_city_services_tag`). Sparse."
      - name: public_space_cleanliness_and_environmental_health
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_public_space_tag`). Sparse."
      - name: voting_and_election_information
        description: "Department tag stored as VARCHAR '0' or '1'. Cast to BOOLEAN in gold (`is_voting_tag`). Sparse."
      - name: _extracted_at
        description: |
          **PIPELINE METADATA -- not for analysis.** UTC timestamp when this
          row was last extracted from the SODA endpoint. Advances on every
          run that touched the row. Use for run-traceability, not for
          business questions about when an event occurred -- use
          `date_created` (gold: `opened_dt`) for the latter.
      - name: _extracted_run_id
        description: |
          **PIPELINE METADATA -- not for analysis.** ULID of the pipeline
          run that produced this row's current state. Joins to
          `main_admin.fct_pipeline_run_raw.run_id` for run-level diagnostics.
      - name: _first_seen_at
        description: |
          **PIPELINE METADATA -- not for analysis.** UTC timestamp when this
          row was first ingested into our warehouse. Preserved across
          subsequent re-extractions. Distinguishes "when did the city
          create this case" (`date_created`) from "when did our pipeline
          first see it" (this column). Maintained by a post-merge UPDATE
          inside `dlt/somerville_311_pipeline.py`, not by dlt's payload.
      - name: _source_endpoint
        description: |
          **PIPELINE METADATA -- not for analysis.** SODA endpoint URL this
          row was extracted from. Static for this project; present
          structurally to support multi-source extensions.
      - name: _dlt_load_id
        description: 'dlt load identifier -- retained at every layer for source-to-pipeline lineage.'
      - name: _dlt_id
        description: 'dlt row identifier -- retained at every layer for source-to-pipeline lineage.'

  - name: raw_somerville_wards
    description: |
      Bronze view over the wards shapefile mirror. Drops the binary
      GEOMETRY column (kept on the raw table for spatial operations);
      exposes WKT strings + numeric metadata. One row per ward (7).
      Geometry stored in both source projection (NAD83 / MA Mainland,
      EPSG:2249, units = US survey feet) and WGS84 (EPSG:4326,
      lat/lng). Use `geometry_wkt_wgs84` for analyst-facing work.
    columns:
      - name: ward_number
        description: 'Ward number (1-7). Joins to `fct_311_requests.ward` (which stores ward as VARCHAR -- cast at the join).'
        data_tests:
          - not_null
          - unique
      - name: object_id
        description: 'ESRI internal OBJECTID. Pipeline metadata; not for analysis.'
      - name: ogc_fid
        description: 'OGC feature id assigned by the spatial reader. Pipeline metadata; not for analysis.'
      - name: shape_length_ftus
        description: 'Polygon perimeter length in US survey feet (source projection unit). Gold layer converts to meters.'
      - name: shape_area_sqftus
        description: 'Polygon area in square US survey feet (source projection unit). Gold layer converts to sq km.'
      - name: geometry_wkt_wgs84
        description: 'Polygon geometry as WKT in WGS84 (EPSG:4326). Lat/lng-friendly; the analyst-facing geometry column.'
      - name: geometry_wkt_source
        description: 'Polygon geometry as WKT in source projection (EPSG:2249). Retained for round-trip back to shapefile + projection-aware spatial joins.'
      - name: _source_srid
        description: '**PIPELINE METADATA.** Source projection identifier. Static `EPSG:2249` for this dataset.'
      - name: _extracted_at
        description: '**PIPELINE METADATA.** UTC timestamp when the shapefile was loaded.'
      - name: _source_url
        description: '**PIPELINE METADATA.** Canonical Socrata permalink for the source dataset.'
      - name: _source_filename
        description: '**PIPELINE METADATA.** Source shapefile filename inside the Socrata ZIP blob.'

  - name: raw_somerville_crime
    description: |
      Bronze view over the Somerville Police crime reports mirror. Passes
      the 11 source columns through `main_bronze.raw_somerville_crime_raw`
      (dlt-owned) plus the audit + dlt-lineage columns. Arrival data only;
      type casts, deduplication, and any further redaction are deferred
      to silver/gold (MVP 3 work). **PII risk audit:** see
      docs/limitations/crime-data-pii-unredacted-in-bronze.md.
    columns:
      - name: incnum
        description: 'Incident number -- case identifier from SPD records management. Primary key from source; the dlt merge key.'
        data_tests:
          - not_null
          - unique
      - name: day_and_month
        description: 'Calendar day + month (e.g. "1/9"). NULL or blank for sensitive incidents stripped of time at source.'
      - name: year
        description: 'Year the incident was reported (VARCHAR; source values "2017"-"2026" as of 2026-05-13).'
      - name: police_shift
        description: 'Shift during which the incident was reported (e.g. "First Half (4PM - Midnight)").'
      - name: offensecode
        description: 'Three-character NIBRS offense code.'
      - name: offense
        description: 'Offense type label.'
      - name: incdesc
        description: 'NIBRS standard definition of the offense type. Generic legal text, not victim-specific narrative.'
      - name: offensetype
        description: 'Sub-category grouping similar offense types.'
      - name: category
        description: 'Top-level NIBRS category. One of "Crimes against Property" / "Crimes against Person" / "Crimes against Society" / "Other".'
      - name: blockcode
        description: 'Fixed-length 15-character census block code (state + county + tract + block + suffix). Geographic granularity floor -- ~750 blocks across Somerville.'
      - name: ward
        description: 'Ward number (1-7) -- **space-padded to length 15 in source** (e.g. "1              "). Trim at join to gold dim_ward.ward. NULL for ~13% of rows.'
      - name: _extracted_at
        description: '**PIPELINE METADATA.** UTC timestamp of the run that touched the row.'
      - name: _extracted_run_id
        description: '**PIPELINE METADATA.** ULID of the pipeline run.'
      - name: _first_seen_at
        description: '**PIPELINE METADATA.** UTC timestamp when this row was first ingested. Preserved across re-extractions.'
      - name: _source_endpoint
        description: '**PIPELINE METADATA.** Source SODA URL.'
      - name: _dlt_load_id
        description: 'dlt load identifier -- retained at every layer for source-to-pipeline lineage.'
      - name: _dlt_id
        description: 'dlt row identifier -- retained at every layer for source-to-pipeline lineage.'

  - name: raw_somerville_permits
    description: |
      Bronze view over the Somerville Permits mirror. Passes 10 source
      columns through `main_bronze.raw_somerville_permits_raw`
      (dlt-owned, replace mode) plus audit + dlt-lineage columns.
      Inspectional Services Department permit applications 2014-2023.
      64,521 rows. **Source is stale: `rowsUpdatedAt = 2023-05-16`** --
      no new permits have been published in ~3 years. Treat this as a
      historical dataset, not an ongoing feed; any analysis must
      caveat that 2023-2026 permit activity is not represented.

      Joins to operational data are ward-via-spatial: there is no
      `ward` column at source. `latitude`+`longitude` are precise
      enough for a point-in-polygon join against
      `dim_ward.geometry_wkt_wgs84` (silver/gold work, MVP 3).

      Status column has a data quality issue: some rows carry dates as
      status values (e.g. "08/17/2022") rather than status labels.
      Honest-test discipline: no `accepted_values` on `status` -- the
      issue is documented in the limitations entry instead. Arrival
      data only; cleanup is silver's job.

      PII surface is modest: `address` is the property address (public
      information for permits) and `work` is a freeform job
      description that occasionally references street numbers but does
      not carry applicant names. See
      docs/limitations/permits-static-since-2023.md.
    columns:
      - name: id
        description: 'Permit ID, year-prefixed (e.g. "B14-001277" = Building 2014 #001277). Primary key from source.'
        data_tests:
          - not_null
          - unique
      - name: application_date
        description: 'Date the permit application was submitted (calendar_date from source).'
        data_tests:
          - not_null
      - name: issue_date
        description: 'Date the permit was issued. May be NULL for non-issued applications (Withdrawn, Denied, Under Review).'
      - name: type
        description: 'Permit type. 20+ values observed; mostly "Residential Building" (~73%) and "Commercial Building" (~15%). No `accepted_values` test -- long tail acceptable. **11 rows have NULL type** (data quality issue at source); no `not_null` test for this reason -- see limitations entry.'
      - name: status
        description: 'Permit status. Mostly "Issued" (~97%). Known data quality issue: some rows carry dates as status values (e.g. "08/17/2022"). 21 rows have NULL status. See limitations entry.'
      - name: amount
        description: 'Permit fee amount in USD. Numeric.'
      - name: address
        description: 'Property address (public information for permits). Not an applicant identifier.'
      - name: latitude
        description: 'Geocoded latitude (WGS84). Precise enough for point-in-polygon spatial join to dim_ward.'
      - name: longitude
        description: 'Geocoded longitude (WGS84).'
      - name: work
        description: 'Freeform description of permitted work (e.g. "Remove and replace 1500 sf of roofing"). Occasionally includes street numbers in the text; no applicant names observed.'
      - name: _extracted_at
        description: '**PIPELINE METADATA.** UTC timestamp of the run that touched the row.'
      - name: _extracted_run_id
        description: '**PIPELINE METADATA.** ULID of the manual ingestion run.'
      - name: _source_endpoint
        description: '**PIPELINE METADATA.** Source SODA URL.'
      - name: _dlt_load_id
        description: 'dlt load identifier -- retained at every layer for source-to-pipeline lineage.'
      - name: _dlt_id
        description: 'dlt row identifier -- retained at every layer for source-to-pipeline lineage.'

  - name: raw_somerville_happiness_survey
    description: |
      Bronze view over the Somerville Happiness Survey mirror. Passes
      150 source columns through `main_bronze.raw_somerville_happiness_survey_raw`
      (dlt-owned, replace-mode) plus audit + dlt-lineage columns.
      Biennial city-wide perception survey, 2011-2025 (8 waves), 12,583
      rows. One row per (respondent, survey_year); `id` is the source
      PK. Designed to pair with the operational data already in the
      warehouse -- ward + year are the join keys -- but: ward is NULL
      for ~50% of rows (all of 2011 + a few elsewhere), and respondents
      are self-selected. See
      docs/limitations/happiness-survey-self-selection-and-coverage.md
      for the full caveat list.

      Per-column documentation is partial by design: ~30 columns of
      analyst-direct value (id, year, ward, demographics, key
      satisfaction Likerts, ACS context) are documented individually
      below. The remaining ~120 columns are paired `{topic}_num` (1-5
      Likert score) + `{topic}_label` (Strongly Agree, Neutral, etc.)
      for ~40 satisfaction / concern topics (housing, parks,
      transportation, civic participation, city services, schools,
      etc.) and yes/no demographic flags. The naming is mechanical:
      `<topic>_num` is the score, `<topic>_label` is the bucketed
      label. Treat the long tail as a documented uniform shape rather
      than 120 individually-described columns. Arrival data only;
      type casts, year-aware filtering for column drift across waves,
      and quasi-identifier handling are deferred to silver/gold
      (MVP 3 work).
    columns:
      - name: id
        description: 'Respondent-response ID. Primary key from source; year-prefixed integer (sample: 1100001 = 2011 respondent #00001).'
        data_tests:
          - not_null
          - unique
      - name: year
        description: 'Survey wave year. Biennial: 2011, 2013, 2015, 2017, 2019, 2021, 2023, 2025.'
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2011, 2013, 2015, 2017, 2019, 2021, 2023, 2025]
      - name: ward
        description: 'Ward 1-7 (text type from source). NULL for ~50% of rows (all 2011 + a few elsewhere -- the 2011 wave did not collect ward). Required join key to gold dim_ward when not NULL.'
        data_tests:
          - accepted_values:
              arguments:
                values: ['1', '2', '3', '4', '5', '6', '7']
                quote: true
              config:
                where: "ward is not null"
      - name: survey_method
        description: 'Paper, Online, Phone, etc. -- channel through which the response was collected.'
      - name: survey_language
        description: 'Language the respondent took the survey in (English, Spanish, Portuguese, Haitian Creole observed in recent waves).'
      - name: tract
        description: 'Census tract identifier. Geographic granularity below ward when populated; sparse across waves.'
      - name: gender
        description: 'Self-reported gender. Open-ended values bucketed at source (Man / Woman / Non-binary / Prefer not to answer / etc.).'
      - name: age
        description: 'Self-reported age bucket (e.g. "35 to 44"). Bucketed at source to reduce quasi-identifier risk.'
      - name: race_ethnicity
        description: 'Self-reported race / ethnicity. Open-ended.'
      - name: housing_status
        description: 'Renter / Owner / Other. Demographic anchor for housing-affordability questions.'
      - name: highest_level_education
        description: 'Highest education level attained.'
      - name: tenure
        description: 'Length of Somerville residency, bucketed.'
      - name: household_income
        description: 'Household income bucket. Bucketed at source.'
      - name: likely_low_income
        description: 'Derived 0/1 flag: respondent is likely below the local low-income threshold based on income + household size.'
      - name: likely_cost_burdened
        description: 'Derived 0/1 flag: respondent likely spends >30% of income on housing.'
      - name: language_spoken
        description: 'Primary language spoken at home (separate from `survey_language` -- some respondents take an English survey but speak another language at home).'
      - name: happiness_num
        description: 'Headline happiness score, 1-5 Likert (1 = very unhappy, 5 = very happy).'
      - name: happiness_label
        description: 'Headline happiness label paired with `happiness_num`.'
      - name: life_satisfaction_num
        description: 'Life-satisfaction score, 1-5 Likert.'
      - name: somerville_satisfaction_num
        description: 'Satisfaction with Somerville as a place to live, 1-5 Likert.'
      - name: feel_safe_somerville_num
        description: 'Sense of safety in Somerville, 1-5 Likert. Pairs with crime + traffic-citations data once joined.'
      - name: rats_mice_concern_num
        description: 'Concern about rats / mice, 1-5 Likert. Pairs directly with the rat-complaints data app and 311 rodent requests.'
      - name: heard_by_city_num
        description: 'Feels heard by the city, 1-5 Likert. Pairs with 311 responsiveness measures.'
      - name: emergency_response_quality_satisfaction_num
        description: 'Satisfaction with emergency response, 1-5 Likert.'
      - name: census_year
        description: 'ACS reference year for the per-respondent ACS-context columns below.'
      - name: acs_somerville_median_income
        description: "ACS Somerville median household income for the respondent's census tract / `census_year`."
      - name: acs_somerville_avg_household
        description: "ACS Somerville average household size for the respondent's tract / `census_year`."
      - name: inflation_adjustment
        description: "Multiplier to convert this row's income figures to a common reference year (typically the latest wave)."
      - name: _extracted_at
        description: '**PIPELINE METADATA.** UTC timestamp of the run that touched the row.'
      - name: _extracted_run_id
        description: '**PIPELINE METADATA.** ULID of the manual ingestion run.'
      - name: _source_endpoint
        description: '**PIPELINE METADATA.** Source SODA URL.'
      - name: _dlt_load_id
        description: 'dlt load identifier -- retained at every layer for source-to-pipeline lineage.'
      - name: _dlt_id
        description: 'dlt row identifier -- retained at every layer for source-to-pipeline lineage.'
